<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Modify Headers Plus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      height: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    :root {
      --bg: #fff;
      --bg2: #f5f5f5;
      --bg3: #eee;
      --text: #333;
      --text2: #666;
      --text3: #999;
      --border: #ddd;
      --accent: #008CBA;
      --success: #4CAF50;
      --danger: #e53935;
      --green: #2e7d32;
      --red: #c62828;
      --sidebar-w: 150px;
    }
    [data-theme="dark"] {
      --bg: #1e1e1e;
      --bg2: #252525;
      --bg3: #333;
      --text: #e0e0e0;
      --text2: #aaa;
      --text3: #777;
      --border: #444;
      --accent: #4fc3f7;
      --success: #66bb6a;
      --danger: #ef5350;
      --green: #66bb6a;
      --red: #ef5350;
    }

    /* HEADER */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .popup-header .title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-icon {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn-icon:hover { background: var(--bg3); }
    .start-btn {
      padding: 5px 14px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .start-btn.off { background: var(--success); color: #fff; }
    .start-btn.on { background: var(--danger); color: #fff; }

    /* BODY */
    .popup-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-stats {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat { display: flex; align-items: center; gap: 5px; }
    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-dot.green { background: var(--green); }
    .stat-dot.red { background: var(--red); }
    .stat-dot.gray { background: var(--text3); }

    .groups-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .groups-list::-webkit-scrollbar { width: 4px; }
    .groups-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .group-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      font-size: 12px;
    }
    .group-item:hover { background: var(--bg3); }
    .group-item.active {
      background: var(--bg);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .group-item .g-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-item .g-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .group-item .g-count {
      background: var(--bg3);
      color: var(--text3);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .group-item.active .g-count {
      background: var(--accent);
      color: #fff;
    }

    /* MAIN PANEL */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .toggle-all-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-all-btn:hover { background: var(--bg3); }
    .panel-actions {
      display: flex;
      gap: 6px;
    }
    .add-rule-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-rule-btn:hover { opacity: 0.85; }

    /* RULES LIST */
    .rules-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
    }
    .rules-list::-webkit-scrollbar { width: 5px; }
    .rules-list::-webkit-scrollbar-track { background: transparent; }
    .rules-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .rule-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .rule-item:hover { background: var(--bg2); }
    .rule-item:last-child { border-bottom: none; }

    .rule-toggle {
      position: relative;
      width: 32px;
      height: 17px;
      flex-shrink: 0;
    }
    .rule-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .rule-toggle .slider {
      position: absolute;
      inset: 0;
      background: #bbb;
      border-radius: 17px;
      cursor: pointer;
      transition: 0.2s;
    }
    .rule-toggle .slider::before {
      content: '';
      position: absolute;
      width: 13px;
      height: 13px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .rule-toggle input:checked + .slider { background: var(--success); }
    .rule-toggle input:checked + .slider::before { transform: translateX(15px); }

    .rule-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .rule-top {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rule-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .rule-action {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .rule-action.add { background: #e8f5e9; color: #2e7d32; }
    .rule-action.modify { background: #e3f2fd; color: #1565c0; }
    .rule-action.delete { background: #fce4ec; color: #c62828; }
    [data-theme="dark"] .rule-action.add { background: #1b3a1b; color: #66bb6a; }
    [data-theme="dark"] .rule-action.modify { background: #0d2744; color: #64b5f6; }
    [data-theme="dark"] .rule-action.delete { background: #3a1b1b; color: #ef5350; }

    .rule-meta {
      display: flex;
      gap: 8px;
      font-size: 10px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rule-comment {
      font-size: 11px;
      font-style: italic;
      color: var(--accent);
      background: var(--bg2);
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      display: block;
      margin-top: 2px;
    }

    .empty-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text3);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="popup-header">
    <span class="title">MODIFY HEADERS PLUS</span>
    <div class="header-actions">
      <button class="start-btn off" id="start_stop"></button>
      <button class="btn-icon" id="config_btn" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="popup-body">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-stats">
        <span class="stat"><span class="stat-dot green"></span> <span id="stat_active">0</span> active</span>
        <span class="stat"><span class="stat-dot red"></span> <span id="stat_inactive">0</span> inactive</span>
        <span class="stat"><span class="stat-dot gray"></span> <span id="stat_total">0</span> total</span>
      </div>
      <div class="groups-list" id="groups_list"></div>
    </div>

    <!-- MAIN PANEL -->
    <div class="main-panel">
      <div class="panel-header">
        <span class="panel-title" id="panel_title">All Rules</span>
        <div class="panel-actions">
          <button class="add-rule-btn" id="add_rule_btn">+ New Rule</button>
          <button class="toggle-all-btn" id="toggle_all_btn">Toggle All</button>
        </div>
      </div>
      <div class="rules-list" id="rules_list"></div>
    </div>

  </div>

<script type="text/javascript" src="regexps.js"></script>
<script type="text/javascript" src="common.js"></script>
<script type="text/javascript" src="i18n.js"></script>
<script type="text/javascript" src="menu.js"></script>

</body>
</html>
